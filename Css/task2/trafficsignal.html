<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .signal {
        margin-left: 140px;
        position: relative;
        width: 200px;
        height: 460px;
      }
      .housing {
        background-color: black;
        width: 200px;
        height: 400px;
        padding-top: 10px;
        border-radius: 20px;
        box-sizing: border-box;
      }
      #box1, #box2, #box3 {
        height: 100px;
        width: 100px;
        margin: 12px auto;
        border-radius: 50%;
        border: 2px solid wheat;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }
      #box1 { background-color: red; color: white; }
      #box2 { background-color: yellow; color: black; }
      #box3 { background-color: green; color: white; }
      p {
        text-align: center;
      }
      h2 {
        text-align: center;
      }
      #pole {
        position: absolute;
        top: -60px;
        left: calc(50% - 15px);
        height: 60px;
        width: 30px;
        background-color: black;
        border-radius: 6px;
      }
      main {
        border: 5px solid black;
        border-radius: 10px;
        width: 500px;
        height: 1000px;
        padding-top: 5px;
        box-sizing: border-box;
      }
      #movie {
        height: 1000px;
        width: 600px;
        box-sizing: border-box;
        border: 5px solid black;
        background-color: white;
        text-align: center;
      }
      img {
        border-radius: 10px;
      }
      h1 {
        text-align: center;
      }
      #rating {
        text-align: center;
        font-size: large;
      }
    </style>
  </head>
  <body>
    <table>
      <tr> 
        <td>  
          <main>
            <div class="signal">
              <div id="pole"></div>
              <div class="housing">
                <div id="box1"><p>STOP</p></div>
                <div id="box2"><p>GET READY TO LEARN</p></div>
                <div id="box3"><p>START YOUR JOURNEY</p></div>
              </div>
            </div>
            <h2>FULL STACK EXPERTS ACADEMY</h2>
            <p>Learn &bull;Build &bull;Grow</p>
          </main>
        </td>

        <td>
          <div id="movie">
            <img src="https://m.media-amazon.com/images/M/MV5BNzAxYmQyNGItZTdiZC00MTZhLTgzMDEtOGE2YzQyMmRkNDhlXkEyXkFqcGc@._V1_.jpg" width="590" height="800" alt="" />
            <h1>Mayabazar</h1>
            <p id="rating">Rating:9.0/10.0⭐</p>
          </div>
        </td>
      </tr>
    </table>

   
  </body>
</html>
