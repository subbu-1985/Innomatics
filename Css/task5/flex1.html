<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Circular Badges</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: skyblue;
            font-family: Arial, sans-serif;
        }

        .badge-outer {
            width: 550px;
            height: 550px;
            border: 10px solid blueviolet;
            border-radius: 50%;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge-middle {
            width: 400px;
            height: 400px;
            border: 10px solid red;
            border-radius: 50%;
            background-color: skyblue;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge-inner {
            width: 250px;
            height: 250px;
            border: 10px solid rgb(106, 0, 255);
            border-radius: 50%;
            background-color: red;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge-core {
            width: 150px;
            height: 150px;
            border: 10px solid red;
            border-radius: 50%;
            background-color: yellow;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge-text {
            text-align: center;
            color: rgb(255, 51, 0);
            text-shadow: 2px 4px 4px rgba(0, 0, 0, 0.25);
            font-family: Algerian, fantasy;
            font-weight: bold;
            line-height: 1.2;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="badge-outer">
        <div class="badge-middle">
            <div class="badge-inner">
                <div class="badge-core">
                    <div class="badge-text">The Statue<br>of Unity<br>Pride of India</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
